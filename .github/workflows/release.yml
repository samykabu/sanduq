name: release

# Tag an extension release as `<extension>-vX.Y.Z` (e.g. project-v1.0.0).
# This packages extensions/<id>/ into <id>.zip and attaches it to the GitHub Release,
# which catalog.json's download_url points at.

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve extension id from tag
        id: ext
        run: |
          TAG="${GITHUB_REF_NAME}"                 # e.g. project-v1.0.0
          ID="${TAG%-v*}"                          # -> project
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          test -d "extensions/$ID" || { echo "no extensions/$ID for tag $TAG"; exit 1; }

      - name: Package extension
        run: |
          ID="${{ steps.ext.outputs.id }}"
          ( cd extensions && zip -r "../$ID.zip" "$ID" -x '*/config.json' )
          ls -l "$ID.zip"

      - name: Create release and attach asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ext.outputs.id }}.zip
          generate_release_notes: true
