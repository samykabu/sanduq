schema_version: "1.0"

extension:
  id: pr
  name: "Pull Request Workflow"
  version: "4.0.2"
  description: "Generate or update pull requests from Spec Kit artifacts, enforce installed QA and User Manual freshness policies, then process review feedback through an approval-gated fix and reply workflow."
  author: "Samy K. Abushanab"
  repository: "https://github.com/samykabu/sanduq"
  category: "process"
  license: PolyForm-Noncommercial-1.0.0

requires:
  speckit_version: ">=0.2.0"
  extensions:
    - id: illustrate
      version: ">=2.0.0,<3.0.0"
      required: true
    - id: assure
      version: ">=2.0.0,<3.0.0"
      required: false
    - id: user-manual
      version: ">=1.0.0,<2.0.0"
      required: false
  tools:
    - name: git
      required: false
    - name: gh
      required: false

provides:
  commands:
    - name: speckit.pr.generate
      file: commands/speckit.pr.generate.md
      description: "Generate the feature CHANGELOG + plain-English feature-details doc with diagram assets when relevant, then create or update the PR description with the feature details"
    - name: speckit.pr.review-feedback
      file: commands/speckit.pr.review-feedback.md
      description: "Process unresolved PR review feedback through a classify, approve, fix or reply, push, and resolve workflow"

hooks:
  after_implement:
    command: speckit.pr.generate
    optional: true
    prompt: "Generate the feature CHANGELOG + feature-details doc, diagram assets if needed, and update the PR description?"
    description: "Produce reviewer-facing docs, generate diagram assets when relevant, and inject the feature details into the PR description after implementation"

tags:
  - "pr"
  - "changelog"
  - "documentation"
  - "diagram"
  - "sequence"
  - "flowchart"
  - "state-machine"
  - "data-model"
  - "review"
  - "feedback"
  - "code-review"
  - "workflow"
