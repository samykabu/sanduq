name: User Manual preview

on:
  pull_request:
    paths:
      - "User-Manual/**"
      - "specs/**"
      - "User-Manual/tools/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: User-Manual/requirements.lock
      - name: Install documentation toolchain
        run: python -m pip install -r User-Manual/requirements.lock
      - name: Audit manual
        run: python User-Manual/tools/audit_manual.py --root User-Manual
      - name: Build private previews
        shell: bash
        run: |
          set -euo pipefail
          for audience in end-user administrator technical; do
            python User-Manual/tools/build_manual.py \
              --root User-Manual --audience "$audience" --language en --version "pr-${{ github.event.pull_request.number }}" --archive
            if [ -d User-Manual/docs/ar ]; then
              python User-Manual/tools/build_manual.py \
                --root User-Manual --audience "$audience" --language ar --version "pr-${{ github.event.pull_request.number }}" --archive
            fi
          done
      - name: Protect preview bundle
        env:
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          AGE_RECIPIENT: ${{ vars.USER_MANUAL_PREVIEW_AGE_RECIPIENT }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p User-Manual/preview-artifact
          preview="User-Manual/site/pr-${{ github.event.pull_request.number }}"
          if [ "$REPOSITORY_PRIVATE" = "true" ]; then
            tar -C "$preview" -czf User-Manual/preview-artifact/user-manual-preview.tar.gz .
          else
            if [ -z "$AGE_RECIPIENT" ]; then
              echo "::error::Public repositories must configure USER_MANUAL_PREVIEW_AGE_RECIPIENT as a GitHub Actions variable."
              exit 1
            fi
            sudo apt-get update -y
            sudo apt-get install -y age
            tar -C "$preview" -czf - . | age -r "$AGE_RECIPIENT" -o User-Manual/preview-artifact/user-manual-preview.tar.gz.age
          fi
      - name: Upload private preview artifact
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-manual-preview-pr-${{ github.event.pull_request.number }}
          path: User-Manual/preview-artifact/
          if-no-files-found: error
          retention-days: 14
      - name: Add preview link to pull request
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.artifact.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- user-manual-preview -->';
            const protection = context.payload.repository.private
              ? 'Access follows private repository permissions.'
              : 'The bundle is age-encrypted; obtain the private key through the approved team channel.';
            const body = `${marker}\nUser Manual private preview: [artifact](${process.env.ARTIFACT_URL}). ${protection}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body
              });
            }
