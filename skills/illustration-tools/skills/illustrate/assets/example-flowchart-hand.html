      justify-content: center;

      text-transform: uppercase;

      font-family: var(--font-serif);

      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 900px; display: block; }
