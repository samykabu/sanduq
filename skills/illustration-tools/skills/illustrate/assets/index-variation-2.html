<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illustrate - Canvas deck</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
        --canvas: #0e1118;
        --surface: #151a23;
        --surface-raised: #1c222d;
        --surface-soft: #242b37;
        --ink: #f0f3f8;
        --muted: #98a2b4;
        --line: rgba(239, 243, 248, 0.12);
        --line-strong: rgba(239, 243, 248, 0.22);
        --accent: #df6847;
        --accent-soft: rgba(223, 104, 71, 0.17);
        --shadow: 0 32px 86px rgba(0, 0, 0, 0.4);
        --sans: "Segoe UI Variable", "Aptos", "Segoe UI", sans-serif;
        --mono: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --canvas: #e9edf3;
        --surface: #f7f8fb;
        --surface-raised: #ffffff;
        --surface-soft: #e4e8ef;
        --ink: #171a21;
        --muted: #667084;
        --line: rgba(23, 26, 33, 0.12);
        --line-strong: rgba(23, 26, 33, 0.23);
        --accent: #bd4f31;
        --accent-soft: rgba(189, 79, 49, 0.13);
        --shadow: 0 28px 76px rgba(42, 52, 72, 0.17);
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100dvh;
        height: 100dvh;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background:
          linear-gradient(135deg, var(--accent-soft), transparent 24rem),
          var(--canvas);
        color: var(--ink);
        font-family: var(--sans);
      }

      button,
      input,
      select,
      a {
        font: inherit;
      }

      button,
      select,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      a:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
      }

      .command-bar {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        min-height: 4.5rem;
        padding: 0.7rem 1rem;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--canvas) 84%, transparent);
        backdrop-filter: blur(18px) saturate(130%);
        -webkit-backdrop-filter: blur(18px) saturate(130%);
      }

      .wordmark {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 10rem;
      }

      .mark {
        width: 2.25rem;
        height: 2.25rem;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: var(--accent);
        color: #f8f3f0;
        font-weight: 780;
        letter-spacing: -0.05em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
      }

      .wordmark-text strong {
        display: block;
        font-size: 0.9rem;
        letter-spacing: -0.025em;
      }

      .wordmark-text span {
        display: block;
        margin-top: 0.1rem;
        color: var(--muted);
        font-size: 0.68rem;
      }

      .control {
        min-width: 0;
        height: 2.55rem;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        transition:
          border-color 170ms ease,
          background 170ms ease,
          transform 170ms ease;
      }

      .control:hover {
        border-color: var(--line-strong);
        background: var(--surface-raised);
      }

      .select-control {
        flex: 0 1 14rem;
        padding: 0 2.2rem 0 0.75rem;
        cursor: pointer;
      }

      .variant-control {
        flex-basis: 8.5rem;
      }

      .search-control {
        flex: 1 1 12rem;
        padding: 0 0.8rem;
      }

      .search-control::placeholder {
        color: var(--muted);
      }

      .search-control:focus,
      .select-control:focus {
        border-color: var(--accent);
        outline: none;
      }

      .bar-actions {
        flex: 0 0 auto;
        display: flex;
        gap: 0.5rem;
        margin-left: auto;
      }

      .action {
        height: 2.55rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 0.8rem;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
        text-decoration: none;
        font-size: 0.75rem;
        font-weight: 650;
        cursor: pointer;
        transition:
          color 170ms ease,
          border-color 170ms ease,
          transform 170ms ease,
          background 170ms ease;
      }

      .action:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--surface-raised);
      }

      .action:active {
        transform: scale(0.97);
      }

      .stage {
        min-width: 0;
        min-height: 0;
        padding: 1rem 1rem 0.8rem;
      }

      .preview-frame {
        width: 100%;
        height: 100%;
        min-height: 0;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface-raised);
        box-shadow: var(--shadow);
      }

      .frame-bar {
        position: absolute;
        inset: 0 0 auto;
        z-index: 2;
        min-height: 3rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.65rem 0.85rem;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface-raised) 90%, transparent);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .frame-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.78rem;
        font-weight: 680;
      }

      .frame-path {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.63rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      iframe {
        width: 100%;
        height: 100%;
        padding-top: 3rem;
        border: 0;
        background: var(--surface-raised);
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
        transition:
          opacity 220ms ease,
          filter 220ms ease,
          transform 220ms ease;
      }

      iframe.loading {
        opacity: 0.25;
        filter: blur(4px);
        transform: scale(0.992);
      }

      .deck {
        min-width: 0;
        padding: 0 1rem 1rem;
      }

      .deck-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0 0.15rem 0.55rem;
      }

      .deck-header strong {
        font-size: 0.76rem;
      }

      .deck-header span {
        color: var(--muted);
        font-size: 0.68rem;
      }

      .filmstrip {
        display: flex;
        gap: 0.55rem;
        overflow-x: auto;
        padding: 0.15rem 0.1rem 0.35rem;
        scroll-snap-type: x proximity;
        scrollbar-width: thin;
        scrollbar-color: var(--line-strong) transparent;
      }

      .film-card {
        flex: 0 0 11.5rem;
        min-height: 4rem;
        scroll-snap-align: start;
        display: grid;
        grid-template-columns: 3px minmax(0, 1fr);
        gap: 0.7rem;
        align-items: center;
        padding: 0.65rem 0.7rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        color: var(--muted);
        text-align: left;
        cursor: pointer;
        transition:
          color 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .film-card::before {
        content: "";
        width: 3px;
        height: 2rem;
        border-radius: 3px;
        background: var(--line-strong);
        transition:
          height 180ms ease,
          background 180ms ease;
      }

      .film-card:hover {
        color: var(--ink);
        border-color: var(--line-strong);
        background: var(--surface-raised);
        transform: translateY(-2px);
      }

      .film-card.active {
        color: var(--ink);
        border-color: color-mix(in srgb, var(--accent) 48%, transparent);
        background: var(--accent-soft);
      }

      .film-card.active::before {
        height: 2.5rem;
        background: var(--accent);
      }

      .film-card-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.76rem;
        font-weight: 650;
      }

      .film-card-meta {
        display: block;
        margin-top: 0.25rem;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.6rem;
      }

      .deck-empty {
        margin: 0;
        padding: 1rem;
        color: var(--muted);
        font-size: 0.76rem;
      }

      @media (max-width: 980px) {
        body {
          width: 100%;
          max-width: 100vw;
          height: auto;
          min-height: 100dvh;
          overflow: auto;
          overflow-x: hidden;
          grid-template-rows: auto minmax(34rem, 68dvh) auto;
        }

        .command-bar {
          flex-wrap: wrap;
        }

        .wordmark {
          flex: 1 1 auto;
        }

        .select-control,
        .search-control {
          flex: 1 1 12rem;
        }

        .bar-actions {
          margin-left: 0;
        }
      }

      @media (max-width: 620px) {
        body {
          grid-template-rows: auto minmax(30rem, 64dvh) auto;
        }

        .command-bar {
          display: grid;
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
          padding: 0.7rem;
        }

        .wordmark {
          grid-column: 1 / -1;
          flex-basis: 100%;
        }

        .select-control,
        .search-control {
          width: 100%;
          max-width: none;
        }

        .search-control {
          grid-column: 1 / -1;
        }

        .bar-actions {
          grid-column: 1 / -1;
        }

        .stage {
          padding: 0.7rem 0.7rem 0.55rem;
        }

        .deck {
          padding: 0 0.7rem 0.7rem;
        }

        .frame-path {
          display: none;
        }

        .film-card {
          flex-basis: 9.75rem;
        }

        .deck-header span {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }

      @media (prefers-reduced-transparency: reduce) {
        .command-bar,
        .frame-bar {
          background: var(--surface);
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="command-bar">
      <div class="wordmark">
        <div class="mark" aria-hidden="true">I</div>
        <div class="wordmark-text">
          <strong>Illustrate</strong>
          <span>Canvas deck</span>
        </div>
      </div>

      <select class="control select-control" id="family-select" aria-label="Illustration family">
        <option value="editorial">Editorial library</option>
        <option value="architecture">Technical architecture</option>
        <option value="process">Technical process flow</option>
      </select>

      <select
        class="control select-control variant-control"
        id="variant-select"
        aria-label="Presentation variant"
      ></select>

      <input
        class="control search-control"
        id="search"
        type="search"
        placeholder="Find a diagram"
        autocomplete="off"
        aria-label="Filter diagram types"
      />

      <div class="bar-actions">
        <button class="action" id="theme-toggle" type="button">Light shell</button>
        <a
          class="action"
          id="open-source"
          href="example-architecture.html"
          target="_blank"
          rel="noopener"
          >Open source</a
        >
      </div>
    </header>

    <main class="stage">
      <section class="preview-frame" aria-label="Diagram preview">
        <header class="frame-bar">
          <span class="frame-title" id="frame-title">Architecture</span>
          <span class="frame-path" id="frame-path">example-architecture.html</span>
        </header>
        <iframe
          id="preview"
          src="example-architecture.html"
          title="Architecture preview"
        ></iframe>
      </section>
    </main>

    <footer class="deck">
      <div class="deck-header">
        <strong id="deck-title">Editorial library</strong>
        <span>Use left and right arrow keys to move</span>
      </div>
      <nav class="filmstrip" id="filmstrip" aria-label="Diagram type"></nav>
    </footer>

    <script>
      const families = {
        editorial: {
          label: "Editorial library",
          meta: "Core",
          base: "",
          prefix: "example-",
          defaultItem: "architecture",
          defaultVariant: "",
          variants: [
            ["", "Light"],
            ["-dark", "Dark"],
            ["-full", "Full editorial"],
            ["-hand", "Hand drawn"],
          ],
          items: [
            ["architecture", "Architecture"],
            ["flowchart", "Flowchart"],
            ["sequence", "Sequence"],
            ["state", "State machine"],
            ["er", "ER model"],
            ["timeline", "Timeline"],
            ["swimlane", "Swimlane"],
            ["quadrant", "Quadrant"],
            ["nested", "Nested"],
            ["tree", "Tree"],
            ["org-chart", "Org chart"],
            ["layers", "Layers"],
            ["venn", "Venn"],
            ["pyramid", "Pyramid"],
            ["radar", "Radar"],
            ["loop", "Loop"],
            ["datalake", "Data lake"],
            ["bar", "Bar chart"],
            ["line", "Line chart"],
            ["gantt", "Gantt"],
            ["scatter", "Scatter"],
            ["medallion", "Medallion"],
            ["high-level", "High level"],
            ["process", "Process"],
            ["data-flow", "Data flow"],
            ["dp-integration", "DP integration"],
            ["high-level-vertical", "Parametric stack"],
            ["dp-security-matrix", "DP security matrix"],
            ["it-state", "IT current state"],
          ],
        },
        architecture: {
          label: "Technical architecture",
          meta: "Color system",
          base: "technical-color/architecture/examples/",
          prefix: "",
          defaultItem: "aws-serverless",
          defaultVariant: "-light",
          variants: [
            ["-light", "Light"],
            ["", "Dark"],
          ],
          items: [
            ["aws-serverless", "AWS serverless"],
            ["microservices", "Microservices"],
            ["web-app", "Web application"],
          ],
        },
        process: {
          label: "Technical process flow",
          meta: "Color system",
          base: "technical-color/process-flow/examples/",
          prefix: "",
          defaultItem: "ai-governance-workflow",
          defaultVariant: "-light",
          variants: [
            ["-light", "Light"],
            ["", "Dark"],
          ],
          items: [
            ["ai-governance-workflow", "AI governance"],
            ["inventory-control", "Inventory control"],
            ["it-change-management", "IT change management"],
            ["sprint-report-flow", "Sprint report"],
          ],
        },
      };

      const state = {
        family: "editorial",
        search: "",
        selections: Object.fromEntries(
          Object.entries(families).map(([key, family]) => [
            key,
            {
              item: family.defaultItem,
              variant: family.defaultVariant,
            },
          ]),
        ),
      };

      const root = document.documentElement;
      const familySelect = document.getElementById("family-select");
      const variantSelect = document.getElementById("variant-select");
      const search = document.getElementById("search");
      const themeToggle = document.getElementById("theme-toggle");
      const openSource = document.getElementById("open-source");
      const frameTitle = document.getElementById("frame-title");
      const framePath = document.getElementById("frame-path");
      const preview = document.getElementById("preview");
      const deckTitle = document.getElementById("deck-title");
      const filmstrip = document.getElementById("filmstrip");

      function selectedFamily() {
        return families[state.family];
      }

      function selectedState() {
        return state.selections[state.family];
      }

      function sourcePath() {
        const family = selectedFamily();
        const selection = selectedState();
        return `${family.base}${family.prefix}${selection.item}${selection.variant}.html`;
      }

      function itemLabel(key) {
        return selectedFamily().items.find(([item]) => item === key)?.[1] ?? key;
      }

      function renderVariants() {
        const family = selectedFamily();
        const selection = selectedState();
        variantSelect.innerHTML = "";
        family.variants.forEach(([value, label]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;
          option.selected = value === selection.variant;
          variantSelect.appendChild(option);
        });
      }

      function filteredItems() {
        const query = state.search.trim().toLowerCase();
        return selectedFamily().items.filter(([, label]) =>
          label.toLowerCase().includes(query),
        );
      }

      function renderFilmstrip() {
        const family = selectedFamily();
        const selection = selectedState();
        const items = filteredItems();
        filmstrip.innerHTML = "";

        if (!items.length) {
          filmstrip.innerHTML = '<p class="deck-empty">No diagrams match this filter.</p>';
          return;
        }

        items.forEach(([key, label]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `film-card${key === selection.item ? " active" : ""}`;
          button.dataset.item = key;
          button.setAttribute("aria-pressed", String(key === selection.item));
          button.innerHTML = `<span><span class="film-card-title">${label}</span><span class="film-card-meta">${family.meta}</span></span>`;
          button.addEventListener("click", () => selectItem(key));
          filmstrip.appendChild(button);
        });
      }

      function renderFrame() {
        const path = sourcePath();
        const label = itemLabel(selectedState().item);
        frameTitle.textContent = `${label} - ${selectedFamily().label}`;
        framePath.textContent = path;
        openSource.href = path;
        preview.title = `${label} preview`;
        deckTitle.textContent = selectedFamily().label;
      }

      function loadPreview() {
        preview.classList.add("loading");
        window.setTimeout(() => {
          preview.src = sourcePath();
        }, 90);
      }

      function selectItem(key) {
        selectedState().item = key;
        renderFilmstrip();
        renderFrame();
        loadPreview();
        filmstrip
          .querySelector(`[data-item="${key}"]`)
          ?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
      }

      function selectRelative(direction) {
        const items = filteredItems();
        if (!items.length) return;
        const current = items.findIndex(([key]) => key === selectedState().item);
        const safeCurrent = current < 0 ? 0 : current;
        const next = (safeCurrent + direction + items.length) % items.length;
        selectItem(items[next][0]);
      }

      function render() {
        familySelect.value = state.family;
        renderVariants();
        renderFilmstrip();
        renderFrame();
      }

      familySelect.addEventListener("change", () => {
        state.family = familySelect.value;
        state.search = "";
        search.value = "";
        render();
        loadPreview();
      });

      variantSelect.addEventListener("change", () => {
        selectedState().variant = variantSelect.value;
        renderFrame();
        loadPreview();
      });

      search.addEventListener("input", () => {
        state.search = search.value;
        renderFilmstrip();
      });

      themeToggle.addEventListener("click", () => {
        const next = root.dataset.theme === "dark" ? "light" : "dark";
        root.dataset.theme = next;
        themeToggle.textContent = next === "dark" ? "Light shell" : "Dark shell";
      });

      preview.addEventListener("load", () => {
        preview.classList.remove("loading");
      });

      document.addEventListener("keydown", (event) => {
        if (document.activeElement.matches("input, select")) return;
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          selectRelative(-1);
        }
        if (event.key === "ArrowRight") {
          event.preventDefault();
          selectRelative(1);
        }
      });

      render();
    </script>
  </body>
</html>
